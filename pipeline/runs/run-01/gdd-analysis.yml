    notes: >
      Gravity: strictly downward. Empty columns do NOT collapse horizontally.
      Fall duration 80ms per row dropped, power1.out ease.
      Multi-column settling is simultaneous.
      Bubble identity must be stable across gravity moves (renderer keys by entity ID).
      Board diff after gravity: only moved bubbles animate; settled ones are stationary.
      Squash/bounce magnitude scales with fall distance (1-row = subtle, 5-row = larger bounce).


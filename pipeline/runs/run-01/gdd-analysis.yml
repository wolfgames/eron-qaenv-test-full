    ux:
      discovery: "Win triggers automatically when last snack collected; lose when moves reach 0"
      feedback: "Win: celebratory bubble cascade + Scooby happy-spin; Lose: snack tiles pulse red + Scooby sad-face"
      onboarding: "HUD always shows remaining moves and snack count — player knows where they stand"
    notes: >
      Win: snacksRemaining == 0 → board freezes → celebratory cascade (30ms stagger L-to-R, T-to-B)
      → Scooby happy-spin (500ms) → 'Scooby-Dooby-Doo!' audio → stars calculated → goto('results').
      Lose: movesRemaining == 0 AND snacksRemaining > 0 after board settles → board freezes →
      remaining snacks pulse red (300ms loop, 2 cycles) → Scooby sad-face (400ms) →
      'Ruh-roh!' audio → Loss Screen overlay fades in (400ms crossfade).
      Stars: 3 = >50% moves remaining; 2 = 20–50%; 1 = <20%.

  - id: feature-scoring
    name: "Scoring system (multi-dimensional)"
    status: new
    risk: LOW
    complexity: med
    cos_required: [scoring]
    ux_zones:

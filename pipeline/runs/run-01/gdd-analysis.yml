      snack collect → settle → check win/lose.
      Bubble cells must be minimum 44×44px tap targets (entire cell, no dead zones).
      Grid: 7 cols × 9 rows. Cell size = (viewportW - padding) / 7. Minimum cell ~44pt at 390px.
      MEDIUM risk: visual renderer + animation + input routing.


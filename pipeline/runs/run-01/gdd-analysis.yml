# ─────────────────────────────────────────────────────────────────────────────
# CONFLICTS (none — this is a greenfield project)
# ─────────────────────────────────────────────────────────────────────────────
conflicts: []

# ─────────────────────────────────────────────────────────────────────────────
# RISK AREAS
# ─────────────────────────────────────────────────────────────────────────────
risk_areas:
  - feature: pixi-game-controller
    reason: >
      Central integration point (risk-rules: HIGH). Wires ECS, Pixi app, all renderers,
      and input routing. Every other GPU feature depends on it. Breakage here blocks all
      gameplay. Must be implemented and verified first.

  - feature: feature-ecs-plugin
    reason: >
      ECS is source of truth for all game state (ecs-state.mdc). Misclassification of
      resources vs. computed vs. transactions breaks bridgeEcsToSignals() and all DOM
      screen reactivity. Must match property order: extends→services→components→resources
      →archetypes→computed→transactions→actions→systems.

  - feature: feature-level-generation
    reason: >
      Complex 5-step algorithm with retry logic (up to 10 retries), fallback chain, and
      solvability simulation. Seeded PRNG must produce identical output per levelNumber
      across devices. Solvability simulation (greedy optimal play) adds algorithmic complexity.

  - feature: feature-hud-renderer
    reason: >
      reserved_top_px is currently 0 in pipeline-context.yml. HUD strip adds ~80pt at top,
      which changes the board's available viewport height. BoardRenderer's cell-size
      calculation must account for this reserved space. If not coordinated, board may
      overflow or be incorrectly sized.

# ─────────────────────────────────────────────────────────────────────────────
# OPEN QUESTIONS
# ─────────────────────────────────────────────────────────────────────────────
open_questions:
  - id: q-game-name
    question: "What slug should be used for the game folder?"
    context: >
      GDD title is 'Scooby Snack Bubble Pop'. Plan phase resolves the game slug
      (e.g. 'bubblepop', 'scooby-pop', 'snack-pop') and substitutes <game-root>
      → src/game/<slug>/. Analyze cannot resolve this — plan owns it.

  - id: q-ad-currency-sdk
    question: "What ad SDK and currency system handle the 'Keep Going!' continue flow?"
    context: >
      GDD specifies 'Watch Ad' or 'spend in-game currency' for +5 moves. Neither an ad SDK
      nor a currency system is present in the scaffold or pipeline-context.yml stack.
      If not available, the 'Keep Going!' button should still exist but its callback
      must be stubbed per guardrail #15 (no stubs) — this needs resolution in plan.
      Flagged because the feature cannot be fully implemented without a known integration point.

  - id: q-asset-atlas
    question: "Will sprite atlases for bubble flavors and Scooby portraits be provided, or should emoji/placeholder shapes be used?"
    context: >
      GDD describes detailed bubble visuals (round glossy bubbles with flavor icons, color-coded rims)
      and a Scooby portrait with multiple expression states. The canvas CoS requires recognizable
      art at 48×48px minimum. If atlases are not provided, the scaffold's asset-fallback priority
      (emoji > sprite+tint > labeled shape) applies as a soft default, but the 70s cartoon
      identity will not be achievable without real art assets.

  - id: q-chapter-structure
    question: "How many levels constitute one chapter, and how many chapters are planned?"
    context: >
      GDD references 'Chapter 1: The Creeping Manor' and 'chapter completion' screens, but
      does not specify levels-per-chapter or total chapter count. This affects: chapter
      boundary detection in PROGRESSION logic, interstitial trigger points (ZONE_SIZE constant
      in lifecycle.md), and hand-crafted level data schema (chapter assignment field).

# ─────────────────────────────────────────────────────────────────────────────
# WARNINGS (collisions with loaded rules/scaffold facts)
# ─────────────────────────────────────────────────────────────────────────────
warnings:
  - "collision:font-stack — gdd=wobbly-70s-lettering vs skill=Baloo,system-ui,sans-serif (src/game/config.ts:GAME_FONT_FAMILY) — soft"
  - "collision:game-mode — gdd=pixi-gpu-canvas vs scaffold=dom (src/game/mygame/screens/gameController.ts:gameMode:'dom') — soft"
  - "collision:results-screen-copy — gdd='Ruh-roh! Out of moves!' vs scaffold='Game Over' (src/game/screens/ResultsScreen.tsx:h1) — soft"
  - "collision:reserved-top-px — gdd=hud-strip-80pt vs runContext=reserved_top_px:0 (pipeline-context.yml) — soft"

    ux:
      discovery: "Score counter in HUD updates on every pop"
      feedback: "Floating score popups on pop (optional juice), counter increments"
      onboarding: "N/A — scoring is implicit"
    notes: >
      Scoring formula (CoS scoring — base pass):
        popScore = (groupSize - 1) * 100           // 2-pop=100, 5-pop=400, 10-pop=900
        cascadeMultiplier = cascadeDepth + 1        // flat pop=x1, first cascade=x2, etc.
        moveEfficiency = moveLimitTotal / movesUsed // increases score for fewer moves used
        levelScore = popScore * cascadeMultiplier * moveEfficiency (rounded to integer)
      Star rating (cosmetic): ties into movesRemaining at win — stored in ECS resource starsEarned.
      LOW risk: pure math, isolated, testable.


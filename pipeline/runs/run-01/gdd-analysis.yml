      onboarding: "Levels 1–5 are hand-crafted tutorials — procedural starts at level 6"
    notes: >
      5-step algorithm: seed init → difficulty parameterization → snack placement →
      bubble fill → solvability check.
      Seed formula: levelNumber × 73829. Retry seeds: seed + retryCount. Max 10 retries.
      Fallback chain: previous-level layout (snackCount-1, moveLimit+5) → hardcoded safe template.
      Solvability: simulate greedy optimal play; isValid = (minMoves <= moveLimit * 0.75).
      Hand-crafted levels 1–5 stored in data/hand-crafted-levels.json (same schema).
      No Math.random() — seeded PRNG only (aligns with guardrail #9 and ecs-state.mdc purity).
      HIGH risk: complex algorithm with retry logic, fallback chain, and solvability simulation.


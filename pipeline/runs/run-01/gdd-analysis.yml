      feedback: "All interaction feedback routed through Pixi canvas"
      onboarding: "N/A — container for all game systems"
    notes: >
      Current mygame/screens/gameController.ts uses gameMode:'dom' and creates DOM elements.
      Must be replaced with a Pixi Application (gameMode:'pixi') that: inits Pixi, sets up

  # Source: greenfield_defaults — no existing layout code; values derived from GDD specs
  #         and guardrail floors (mobile-constraints.mdc, canvas.md, core-guidelines.md).
  default:
    viewport_w: 390
    viewport_h: 844
    reserved_top_px: 80
    reserved_bottom_px: 64
    cell_px: 53
    gap_px: 3
    board_cols: 7
    board_rows: 9
    board_w_px: 374
    board_h_px: 486
    available_h_px: 700
    board_pct_available: 69
